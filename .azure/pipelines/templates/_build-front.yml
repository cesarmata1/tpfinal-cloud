parameters:
  node_version: '20.x'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: ${{ parameters.node_version }}

  - script: npm ci
    displayName: Install dependencies

  - script: npm run build
    displayName: Build app
    env:
      VITE_BUILD_ID: $(Build.SourceVersion)

  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: dist
      artifact: front-dist
